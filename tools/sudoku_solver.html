    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --grid-line: #2d2d2d;
            --given: #1a1a1a;
            --user: #4a6fa5;
            --solved: #2a9d8f;
            --error-bg: #fdeaea;
            --error-text: #c0392b;
            --focus: #4a6fa5;
            --highlight: #f5f0eb;
            --same-digit: #e8f0fe;
            --btn-primary: #4a6fa5;
            --btn-primary-text: #fff;
            --btn-secondary: #e5e5e5;
            --btn-secondary-text: #333;
            --btn-active: #4a6fa5;
            --subtle: #888;
            --border: #d0d0d0;
        }

        html {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text);
            background: var(--bg)
        }

        body {
            max-width: 520px;
            margin: 0 auto;
            padding: 16px
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns:repeat(9, 1fr);
            border: 3px solid var(--grid-line);
            border-radius: 8px;
            overflow: hidden;
            width: calc(min(100vw - 32px, 468px));
            margin: 0 auto;
        }

        /* Borders on wrappers */
        .cell-wrap {
            position: relative;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .cell-wrap:nth-child(9n) {
            border-right: none
        }

        .cell-wrap:nth-child(n+73) {
            border-bottom: none
        }

        .cell-wrap:nth-child(3n):not(:nth-child(9n)) {
            border-right: 3px solid var(--grid-line)
        }

        .cell-wrap:nth-child(n+19):nth-child(-n+27),
        .cell-wrap:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 3px solid var(--grid-line)
        }

        /* Highlight states on wrapper background */
        .cell-wrap.highlight {
            background: var(--highlight)
        }

        .cell-wrap.same-digit {
            background: var(--same-digit)
        }

        .cell-wrap.focused {
            box-shadow: inset 0 0 0 2px var(--focus);
            z-index: 1
        }

        .cell-wrap.error {
            background: var(--error-bg)
        }

        .cell-wrap input {
            display: block;
            width: 100%;
            aspect-ratio: 1;
            border: none;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(16px, 4vw, 22px);
            font-weight: 600;
            background: transparent;
            color: var(--user);
            outline: none;
            caret-color: transparent;
            padding: 0;
            position: relative;
            z-index: 2;
        }

        .cell-wrap input.given {
            color: var(--given);
            font-weight: 700
        }

        .cell-wrap input.solved-digit {
            color: var(--solved)
        }

        .cell-wrap.error input {
            color: var(--error-text)
        }

        /* Hide input text when pencil marks are visible so marks show through */
        .cell-wrap.has-pencil input {
            color: transparent
        }

        /* Pencil marks */
        .pencil-marks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns:repeat(3, 1fr);
            grid-template-rows:repeat(3, 1fr);
            pointer-events: none;
            padding: 1px;
            z-index: 1;
        }

        .pencil-marks span {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(8px, 2vw, 11px);
            color: var(--subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-weight: 500;
        }

        .status {
            text-align: center;
            min-height: 24px;
            font-size: 14px;
            margin: 10px 0;
            color: var(--subtle);
            font-weight: 500
        }

        .status.err {
            color: var(--error-text)
        }

        .status.ok {

        }

        .btn-row {

        }

        button {

        }

        button.primary {

        }

        button.active {
            background: var(--btn-active);
            color: #fff
        }

        button:disabled {
            opacity: .4;

        }

        .string-section {

        .string-toggle {
            font-size: 12px;
            color: var(--subtle);
            cursor: pointer;
            text-align: center;

        }

        .string-toggle:hover {

        }

        .string-body {
            display: none;
            margin-top: 8px
        }

        .string-body.open {
            display: flex;
            gap: 6px;
            align-items: center
        }

        .string-body input {
            flex: 1;

        .string-body input:focus {

        }

        .diff-label {
            text-align: center;
            font-size: 12px;
            color: var(--subtle);
            margin-bottom: 6px;
            min-height: 18px
        }
    </style>

<body>
<h1>Sudoku Solver</h1>
<div class="diff-label" id="diff-label"></div>
<div class="sudoku-grid" id="grid"></div>
<div class="status" id="status"></div>
<div class="btn-row">
    <button class="primary" id="btn-solve">Solve</button>
    <button class="primary" id="btn-hint">Hint</button>
    <button id="btn-pencil">Pencil</button>
    <button id="btn-undo" disabled>↶ Undo</button>
    <button id="btn-redo" disabled>↷ Redo</button>
    <button id="btn-clear">Clear</button>
</div>
<div class="btn-row">
    <span style="font-size:12px;color:var(--subtle);margin-right:4px">Sample:</span>
    <button class="sample" data-s="1">Medium</button>
    <button class="sample" data-s="2">Hard</button>
</div>
<div class="string-section">
    <div class="string-toggle" id="str-toggle">▸ Import / Export string</div>
    <div class="string-body" id="str-body">
        <input type="text" id="str-input" placeholder="Paste 81 digits (0 or . = empty)" spellcheck="false"
               autocomplete="off">
        <button id="str-import">Import</button>
        <button id="str-copy">Copy</button>
    </div>
    <div id="str-err" style="text-align:center;color:var(--error-text);font-size:11px"></div>
</div>
<script>
    class SudokuSolver {
        constructor() {
            this.grid = Array.from({length: 9}, () => Array(9).fill(0));
            this.candidates = Array.from({length: 9}, () => Array.from({length: 9}, () => new Set()));
            this.given = new Set();
            this.pencilMode = false;
            this.undoStack = [];
            this.redoStack = [];
            this.focusedIndex = -1;
            this.samples = [
                null,
                "000600400700003600000091080000000000050180003000306045040200060903000000020000100",
                "800000000003600000070090200050007000000045700000100030001000068008500010090000400"
            ];
            this.buildGrid();
            this.bindEvents();
            this.loadSample(1);
        }

        getCell(i) {
            return document.querySelector(`.cell-wrap[data-i="${i}"]`);
        }

        getInput(i) {
            return this.getCell(i)?.querySelector('input');
        }

        buildGrid() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for (let i = 0; i < 81; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'cell-wrap';
                wrap.dataset.i = i;

                const inp = document.createElement('input');
                inp.type = 'text';
                inp.maxLength = 1;
                inp.setAttribute('inputmode', 'numeric');
                inp.setAttribute('autocomplete', 'off');
                inp.setAttribute('aria-label', `Cell ${(i / 9 | 0) + 1},${(i % 9) + 1}`);
                wrap.appendChild(inp);

                const pm = document.createElement('div');
                pm.className = 'pencil-marks';
                pm.style.display = 'none';
                for (let d = 1; d <= 9; d++) {
                    const sp = document.createElement('span');
                    pm.appendChild(sp);
                }
                wrap.appendChild(pm);

                g.appendChild(wrap);
            }
        }

        bindEvents() {
            const g = document.getElementById('grid');
            g.addEventListener('input', e => this.onInput(e));
            g.addEventListener('keydown', e => this.onKeydown(e));
            g.addEventListener('focusin', e => {
                const wrap = e.target.closest('.cell-wrap');
                if (wrap) {
                    this.focusedIndex = +wrap.dataset.i;
                    this.renderHighlights();
                }
            });
            g.addEventListener('focusout', () => {
                this.focusedIndex = -1;
                this.renderHighlights();
            });

            document.getElementById('btn-solve').onclick = () => this.solve();
            document.getElementById('btn-hint').onclick = () => this.hint();
            document.getElementById('btn-pencil').onclick = () => this.togglePencil();
            document.getElementById('btn-undo').onclick = () => this.undo();
            document.getElementById('btn-redo').onclick = () => this.redo();
            document.getElementById('btn-clear').onclick = () => this.clear();
            document.querySelectorAll('.sample').forEach(b =>
                b.onclick = () => this.loadSample(+b.dataset.s)
            );

            document.getElementById('str-toggle').onclick = () => {
                const b = document.getElementById('str-body');
                const t = document.getElementById('str-toggle');
                b.classList.toggle('open');
                t.textContent = b.classList.contains('open') ? '▾ Import / Export string' : '▸ Import / Export string';
            };
            document.getElementById('str-import').onclick = () => this.importString();
            document.getElementById('str-copy').onclick = () => this.exportString();

            document.addEventListener('paste', e => {
                if (document.activeElement.id === 'str-input') return;
                const t = (e.clipboardData || window.clipboardData).getData('text').replace(/[\s\n\r]/g, '');
                if (/^[0-9.]{81}$/.test(t)) {
                    e.preventDefault();
                    this.loadFromString(t);
                    this.setStatus('Puzzle imported from clipboard', 'ok');
                }
            });
        }

// --- State management ---
        snapshot() {
            return {
                grid: this.grid.map(r => [...r]),
                candidates: this.candidates.map(r => r.map(s => new Set(s)))
            };
        }

        pushUndo() {
            this.undoStack.push(this.snapshot());
            if (this.undoStack.length > 200) this.undoStack.shift();
            this.redoStack = [];
            this.updateUndoButtons();
        }

        undo() {
            if (!this.undoStack.length) return;
            this.redoStack.push(this.snapshot());
            const s = this.undoStack.pop();
            this.grid = s.grid;
            this.candidates = s.candidates;
            this.renderAll();
            this.updateUndoButtons();
        }

        redo() {
            if (!this.redoStack.length) return;
            this.undoStack.push(this.snapshot());
            const s = this.redoStack.pop();
            this.grid = s.grid;
            this.candidates = s.candidates;
            this.renderAll();
            this.updateUndoButtons();
        }

        updateUndoButtons() {
            document.getElementById('btn-undo').disabled = !this.undoStack.length;
            document.getElementById('btn-redo').disabled = !this.redoStack.length;
        }

// --- Input handling ---
        onInput(e) {
            const inp = e.target;
            const wrap = inp.closest('.cell-wrap');
            if (!wrap) return;
            const idx = +wrap.dataset.i, r = idx / 9 | 0, c = idx % 9;
            if (this.given.has(idx)) {
                inp.value = '';
                return;
            }
            const v = inp.value;
            if (!/^[1-9]$/.test(v)) {
                inp.value = '';
                return;
            }
            const num = +v;

            if (this.pencilMode) {
                inp.value = this.grid[r][c] || '';
                this.pushUndo();
                const s = this.candidates[r][c];
                s.has(num) ? s.delete(num) : s.add(num);
                this.renderCell(idx);
                return;
            }

            this.pushUndo();
            this.grid[r][c] = num;
            this.candidates[r][c].clear();
            this.removeCandidateFromPeers(r, c, num);
            this.renderAll();
            this.advanceToNextEmpty(idx);
        }

        removeCandidateFromPeers(r, c, num) {
            for (let i = 0; i < 9; i++) {
                this.candidates[r][i].delete(num);
                this.candidates[i][c].delete(num);
            }
            const br = (r / 3 | 0) * 3, bc = (c / 3 | 0) * 3;
            for (let i = br; i < br + 3; i++)
                for (let j = bc; j < bc + 3; j++)
                    this.candidates[i][j].delete(num);
        }

        onKeydown(e) {
            const wrap = e.target.closest('.cell-wrap');
            if (!wrap) return;
            const idx = +wrap.dataset.i, r = idx / 9 | 0, c = idx % 9;
            const inp = e.target;

            if (e.key === 'p' || e.key === 'P') {
                if (!e.ctrlKey && !e.metaKey) {
                    e.preventDefault();
                    this.togglePencil();
                }
                return;
            }
            if (e.key === 'Escape') {
                inp.blur();
                return;
            }

            if (e.key === 'Backspace' || e.key === 'Delete') {
                if (!this.given.has(idx) && (this.grid[r][c] || this.candidates[r][c].size)) {
                    e.preventDefault();
                    this.pushUndo();
                    this.grid[r][c] = 0;
                    this.candidates[r][c].clear();
                    this.renderAll();
                }
                return;
            }

            if (e.key === 'Tab') {
                e.preventDefault();
                const dir = e.shiftKey ? -1 : 1;
                let ni = idx + dir;
                while (ni >= 0 && ni < 81 && (this.grid[ni / 9 | 0][ni % 9] !== 0 || this.given.has(ni))) ni += dir;
                if (ni >= 0 && ni < 81) this.focusCell(ni);
                return;
            }

            if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                e.preventDefault();
                e.shiftKey ? this.redo() : this.undo();
                return;
            }

            const moves = {ArrowUp: -9, ArrowDown: 9, ArrowLeft: -1, ArrowRight: 1};
            if (moves[e.key] != null) {
                e.preventDefault();
                let ni = idx + moves[e.key];
                if (e.key === 'ArrowLeft' && c === 0) ni = idx + 8;
                else if (e.key === 'ArrowRight' && c === 8) ni = idx - 8;
                else if (ni < 0) ni += 81;
                else if (ni >= 81) ni -= 81;
                this.focusCell(ni);
                return;
            }

// Typing digit into filled non-given cell: clear input so the input event picks up the new value
            if (/^[1-9]$/.test(e.key) && !this.given.has(idx) && !this.pencilMode) {
                inp.value = '';
            }
        }

        advanceToNextEmpty(from) {
            for (let i = from + 1; i < 81; i++) {
                const r = i / 9 | 0, c = i % 9;
                if (this.grid[r][c] === 0 && !this.given.has(i)) {
                    this.focusCell(i);
                    return;
                }
            }
        }

        focusCell(i) {
            this.getInput(i)?.focus();
        }

        togglePencil() {
            this.pencilMode = !this.pencilMode;
            document.getElementById('btn-pencil').classList.toggle('active', this.pencilMode);
        }

// --- Rendering ---
        renderAll() {
            for (let i = 0; i < 81; i++) this.renderCell(i);
            this.renderHighlights();
            this.detectAllConflicts();
        }

        renderCell(idx) {
            const r = idx / 9 | 0, c = idx % 9;
            const wrap = this.getCell(idx);
            const inp = wrap.querySelector('input');
            const pm = wrap.querySelector('.pencil-marks');
            const v = this.grid[r][c];
            const cands = this.candidates[r][c];

            inp.value = v || '';
            inp.classList.remove('given', 'solved-digit');
            inp.readOnly = this.given.has(idx);
            if (this.given.has(idx)) {
                inp.classList.add('given');
            } else if (v > 0) {
                inp.classList.add('solved-digit');
            }

// Pencil marks
            const hasCands = !v && cands.size > 0;
            wrap.classList.toggle('has-pencil', hasCands);
            pm.style.display = hasCands ? '' : 'none';
            if (hasCands) {
                const spans = pm.children;
                for (let d = 1; d <= 9; d++) {
                    spans[d - 1].textContent = cands.has(d) ? d : '';
                }
            }
        }

        renderHighlights() {
            const fi = this.focusedIndex;
            const fr = fi >= 0 ? fi / 9 | 0 : -1, fc = fi >= 0 ? fi % 9 : -1;
            const fv = fi >= 0 ? this.grid[fr][fc] : 0;
            const fbr = (fr / 3 | 0) * 3, fbc = (fc / 3 | 0) * 3;

            for (let i = 0; i < 81; i++) {
                const wrap = this.getCell(i);
                const r = i / 9 | 0, c = i % 9;
                wrap.classList.remove('highlight', 'same-digit', 'focused');
                if (fi < 0) continue;
                if (i === fi) {
                    wrap.classList.add('focused');
                    continue;
                }
                if (fv && this.grid[r][c] === fv) {
                    wrap.classList.add('same-digit');
                    continue;
                }
                if (r === fr || c === fc || (r >= fbr && r < fbr + 3 && c >= fbc && c < fbc + 3)) {
                    wrap.classList.add('highlight');
                }
            }
        }

        detectAllConflicts() {
            const errs = new Set();
// Rows
            for (let r = 0; r < 9; r++) {
                const seen = {};
                for (let c = 0; c < 9; c++) {
                    const v = this.grid[r][c];
                    if (!v) continue;
                    if (seen[v] != null) {
                        errs.add(r * 9 + c);
                        errs.add(seen[v]);
                    } else seen[v] = r * 9 + c;
                }
            }
// Cols
            for (let c = 0; c < 9; c++) {
                const seen = {};
                for (let r = 0; r < 9; r++) {
                    const v = this.grid[r][c];
                    if (!v) continue;
                    if (seen[v] != null) {
                        errs.add(r * 9 + c);
                        errs.add(seen[v]);
                    } else seen[v] = r * 9 + c;
                }
            }
// Boxes
            for (let br = 0; br < 9; br += 3) for (let bc = 0; bc < 9; bc += 3) {
                const seen = {};
                for (let r = br; r < br + 3; r++) for (let c = bc; c < bc + 3; c++) {
                    const v = this.grid[r][c];
                    if (!v) continue;
                    const k = r * 9 + c;
                    if (seen[v] != null) {
                        errs.add(k);
                        errs.add(seen[v]);
                    } else seen[v] = k;
                }
            }
            for (let i = 0; i < 81; i++) {
                const wrap = this.getCell(i);
                const inp = wrap.querySelector('input');
                wrap.classList.toggle('error', errs.has(i));
                if (!errs.has(i) && !this.given.has(i) && this.grid[i / 9 | 0][i % 9]) {
                    inp.classList.add('solved-digit');
                }
            }
        }

// --- Solver ---
        isValid(grid, r, c, num) {
            for (let i = 0; i < 9; i++) {
                if (grid[r][i] === num || grid[i][c] === num) return false;
            }
            const br = (r / 3 | 0) * 3, bc = (c / 3 | 0) * 3;
            for (let i = br; i < br + 3; i++) for (let j = bc; j < bc + 3; j++) if (grid[i][j] === num) return false;
            return true;
        }

        solveBacktrack(grid) {
            for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) {
                if (grid[r][c]) continue;
                for (let n = 1; n <= 9; n++) {
                    if (this.isValid(grid, r, c, n)) {
                        grid[r][c] = n;
                        if (this.solveBacktrack(grid)) return true;
                        grid[r][c] = 0;
                    }
                }
                return false;
            }
            return true;
        }

        solve() {
// Check existing conflicts
            for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) {
                if (!this.grid[r][c]) continue;
                const v = this.grid[r][c];
                this.grid[r][c] = 0;
                const ok = this.isValid(this.grid, r, c, v);
                this.grid[r][c] = v;
                if (!ok) {
                    this.setStatus('Fix conflicts before solving', 'err');
                    return;
                }
            }
            this.pushUndo();
            const copy = this.grid.map(r => [...r]);
            if (this.solveBacktrack(copy)) {
                this.grid = copy;
                this.candidates = Array.from({length: 9}, () => Array.from({length: 9}, () => new Set()));
                this.renderAll();
                document.querySelectorAll('.cell-wrap input.solved-digit').forEach((el, i) => {
                    el.style.opacity = '0';
                    requestAnimationFrame(() => {
                        el.style.transition = 'opacity .15s';
                        el.style.opacity = '1';
                    });
                });
                this.setStatus('Solved', 'ok');
            } else {
                this.undoStack.pop();
                this.setStatus('No solution exists', 'err');
            }
        }

// --- Hint ---
        hint() {
// Naked singles
            for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) {
                if (this.grid[r][c]) continue;
                const poss = [];
                for (let n = 1; n <= 9; n++) if (this.isValid(this.grid, r, c, n)) poss.push(n);
                if (poss.length === 1) {
                    this.pushUndo();
                    this.grid[r][c] = poss[0];
                    this.candidates[r][c].clear();
                    this.removeCandidateFromPeers(r, c, poss[0]);
                    this.renderAll();
                    this.focusCell(r * 9 + c);
                    this.setStatus(`R${r + 1}C${c + 1} = ${poss[0]} — only possibility for this cell`, 'ok');
                    return;
                }
            }
// Hidden singles
            for (const units of [this.rows(), this.cols(), this.boxes()]) {
                for (const cells of units) {
                    for (let n = 1; n <= 9; n++) {
                        const spots = cells.filter(([r, c]) => !this.grid[r][c] && this.isValid(this.grid, r, c, n));
                        if (spots.length === 1) {
                            const [r, c] = spots[0];
                            this.pushUndo();
                            this.grid[r][c] = n;
                            this.candidates[r][c].clear();
                            this.removeCandidateFromPeers(r, c, n);
                            this.renderAll();
                            this.focusCell(r * 9 + c);
                            this.setStatus(`R${r + 1}C${c + 1} = ${n} — only place for ${n} in its group`, 'ok');
                            return;
                        }
                    }
                }
            }
            this.setStatus('No logical hint found — try Solve', '');
        }

        rows() {
            return Array.from({length: 9}, (_, r) => Array.from({length: 9}, (_, c) => [r, c]));
        }

        cols() {
            return Array.from({length: 9}, (_, c) => Array.from({length: 9}, (_, r) => [r, c]));
        }

        boxes() {
            const b = [];
            for (let br = 0; br < 9; br += 3) for (let bc = 0; bc < 9; bc += 3) {
                const cells = [];
                for (let r = br; r < br + 3; r++) for (let c = bc; c < bc + 3; c++) cells.push([r, c]);
                b.push(cells);
            }
            return b;
        }

// --- String I/O ---
        importString() {
            const raw = document.getElementById('str-input').value.replace(/[\s\n\r]/g, '').replace(/\./g, '0');
            document.getElementById('str-err').textContent = '';
            if (!/^[0-9]{81}$/.test(raw)) {
                document.getElementById('str-err').textContent = 'Need exactly 81 digits (0-9 or .)';
                return;
            }
            this.loadFromString(raw);
            this.setStatus('Puzzle imported', 'ok');
        }

        loadFromString(s) {
            s = s.replace(/\./g, '0');
            this.pushUndo();
            this.given.clear();
            this.candidates = Array.from({length: 9}, () => Array.from({length: 9}, () => new Set()));
            for (let i = 0; i < 81; i++) {
                const r = i / 9 | 0, c = i % 9, v = +s[i];
                this.grid[r][c] = v;
                if (v) this.given.add(i);
            }
            document.getElementById('diff-label').textContent = '';
            this.renderAll();
        }

        exportString() {
            const s = this.grid.flat().join('');
            document.getElementById('str-input').value = s;
            navigator.clipboard?.writeText(s);
            this.setStatus('Copied to clipboard', 'ok');
        }

// --- Sample / Clear ---
        loadSample(n) {
            const s = this.samples[n];
            if (!s) return;
            this.undoStack = [];
            this.redoStack = [];
            this.given.clear();
            this.candidates = Array.from({length: 9}, () => Array.from({length: 9}, () => new Set()));
            for (let i = 0; i < 81; i++) {
                const r = i / 9 | 0, c = i % 9, v = +s[i];
                this.grid[r][c] = v;
                if (v) this.given.add(i);
            }
            document.getElementById('diff-label').textContent = n === 1 ? 'Medium' : 'Hard';
            this.renderAll();
            this.updateUndoButtons();
            this.setStatus('');
        }

        clear() {
            this.pushUndo();
            this.grid = Array.from({length: 9}, () => Array(9).fill(0));
            this.candidates = Array.from({length: 9}, () => Array.from({length: 9}, () => new Set()));
            this.given.clear();
            document.getElementById('diff-label').textContent = '';
            this.renderAll();
            this.setStatus('');
        }

        setStatus(msg, cls) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status' + (cls ? ' ' + cls : '');
        }
    }

    new SudokuSolver();
</script>
